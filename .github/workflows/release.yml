name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.10"

      - name: Build .dxt
        run: python build_dxt.py

      - name: Rename and duplicate as .zip
        shell: bash
        run: |
          mv clockify.dxt "clockify-${{ matrix.platform }}.dxt"
          cp "clockify-${{ matrix.platform }}.dxt" "clockify-${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: clockify-${{ matrix.platform }}
          path: |
            clockify-${{ matrix.platform }}.dxt
            clockify-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
