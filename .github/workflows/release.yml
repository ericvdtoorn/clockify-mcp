name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build clockify.mcpb
        run: |
          python3 build_mcpb.py
          cp clockify.mcpb clockify.zip

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            clockify.mcpb
            clockify.zip
          generate_release_notes: true
